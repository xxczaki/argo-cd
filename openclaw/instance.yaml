apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw-system
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  gateway:
    controlUiOrigins:
      - "https://openclaw.tail12a84.ts.net"
      - "http://localhost:18789"
      - "http://127.0.0.1:18789"
  config:
    mergeMode: merge
    raw:
      gateway:
        trustedProxies:
          - "10.42.0.0/24"
        controlUi:
          dangerouslyDisableDeviceAuth: true
          allowedOrigins:
            - "https://openclaw.tail12a84.ts.net"
      agents:
        defaults:
          model:
            primary: "anthropic/claude-sonnet-4-20250514"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  selfConfigure:
    enabled: true
    allowedActions: [skills, config, envVars, workspaceFiles]
  chromium:
    enabled: true
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
