apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
  namespace: openclaw-system
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  gateway:
    controlUiOrigins:
      - "https://openclaws.tail12a84.ts.net"
      - "http://localhost:18789"
      - "http://127.0.0.1:18789"
  config:
    mergeMode: merge
    raw:
      gateway:
        trustedProxies:
          - "10.42.0.0/24"
        controlUi:
          dangerouslyDisableDeviceAuth: true
          allowedOrigins:
            - "https://openclaws.tail12a84.ts.net"
      channels:
        discord:
          enabled: true
          token: "${DISCORD_BOT_TOKEN}"
          groupPolicy: allowlist
          streaming: "partial"
      agents:
        defaults:
          model:
            primary: "anthropic/claude-sonnet-4-20250514"
  storage:
    persistence:
      enabled: true
      size: 10Gi
  selfConfigure:
    enabled: true
    allowedActions: [skills, config, envVars, workspaceFiles]
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          prometheus: kube-prometheus
  security:
    networkPolicy:
      allowedIngressNamespaces:
        - tailscale
  networking:
    ingress:
      enabled: true
      className: tailscale
      hosts:
        - host: ""
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - openclaws
  extraVolumes:
    - name: extra-bin
      emptyDir: {}
    - name: claude-code
      emptyDir: {}
  extraVolumeMounts:
    - name: extra-bin
      mountPath: /usr/local/bin/gh
      subPath: gh
    - name: claude-code
      mountPath: /opt/claude-code
  env:
    - name: PATH
      value: "/opt/claude-code/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
  initContainers:
    - name: fix-config
      image: node:24-slim
      command: ["node", "-e"]
      args:
        - |
          const fs = require('fs');
          const f = '/data/.openclaw/openclaw.json';
          try {
            const cfg = JSON.parse(fs.readFileSync(f, 'utf8'));
            if (cfg.security) {
              delete cfg.security;
              fs.writeFileSync(f, JSON.stringify(cfg, null, 2));
              console.log('Removed invalid security key from config');
            } else {
              console.log('Config OK, no fix needed');
            }
          } catch(e) { console.log('No config file or parse error:', e.message); }
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: data
          mountPath: /data
    - name: install-gh
      image: alpine:3.21
      command: ["/bin/sh", "-c"]
      args:
        - |
          wget -qO /tmp/gh.tar.gz https://github.com/cli/cli/releases/download/v2.87.3/gh_2.87.3_linux_arm64.tar.gz &&
          tar -xzf /tmp/gh.tar.gz -C /tmp &&
          cp /tmp/gh_2.87.3_linux_arm64/bin/gh /extra-bin/gh &&
          chmod +x /extra-bin/gh
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: extra-bin
          mountPath: /extra-bin
    - name: install-claude-code
      image: node:24-slim
      command: ["/bin/sh", "-c"]
      args:
        - npm install --prefix /opt/claude-code @anthropic-ai/claude-code
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumeMounts:
        - name: claude-code
          mountPath: /opt/claude-code
  chromium:
    enabled: true
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
