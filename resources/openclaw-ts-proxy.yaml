apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-ts-serve-config
  namespace: openclaw-system
data:
  serve-config.json: |
    {
      "TCP": {
        "443": {
          "HTTPS": true
        }
      },
      "Web": {
        "${TS_CERT_DOMAIN}:443": {
          "Handlers": {
            "/": {
              "Proxy": "http://openclaw:18789"
            }
          }
        }
      }
    }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openclaw-ts-proxy
  namespace: openclaw-system
spec:
  replicas: 1
  serviceName: openclaw-ts-proxy
  selector:
    matchLabels:
      app: openclaw-ts-proxy
  template:
    metadata:
      labels:
        app: openclaw-ts-proxy
    spec:
      serviceAccountName: openclaw-ts-proxy
      containers:
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:latest
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: TS_HOSTNAME
              value: openclaw
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            - name: TS_SERVE_CONFIG
              value: /config/serve-config.json
            - name: TS_USERSPACE
              value: "true"
            - name: TS_KUBE_SECRET
              value: ""
          envFrom:
            - secretRef:
                name: openclaw-ts-authkey
          volumeMounts:
            - name: state
              mountPath: /var/lib/tailscale
            - name: serve-config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: serve-config
          configMap:
            name: openclaw-ts-serve-config
  volumeClaimTemplates:
    - metadata:
        name: state
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 256Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-ts-proxy
  namespace: openclaw-system
